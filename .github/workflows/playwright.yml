name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e:
    name: E2E Tests
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Worker dependencies
        run: npm ci
        working-directory: worker

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Set up client env
        run: |
          echo "VITE_API_URL=http://localhost:8787" > client/.env.local
          echo "VITE_API_KEY=" >> client/.env.local

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload HTML report
        id: report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test screenshots
        id: screenshots
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-screenshots
          path: test-results/
          retention-days: 30

      - name: Upload report for GitHub Pages
        if: ${{ !cancelled() && github.event_name == 'push' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

      - name: Add test results to job summary
        if: ${{ !cancelled() }}
        run: |
          echo "## 🎭 Playwright E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Test |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          for dir in test-results/*/; do
            [ -d "$dir" ] || continue
            test_name=$(basename "$dir" | sed 's/-chromium\(-retry[0-9]*\)\{0,1\}$//' | sed 's/-/ /g' | sed 's/^app //')
            png=$(find "$dir" -name "*.png" -maxdepth 1 | head -1)
            if [ -n "$png" ]; then
              if echo "$png" | grep -q "failed"; then
                echo "| ❌ | ${test_name} |" >> $GITHUB_STEP_SUMMARY
              else
                echo "| ✅ | ${test_name} |" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${GITHUB_REPOSITORY#*/}/"
          echo "📊 **[View HTML Report with Screenshots](${PAGES_URL})** *(updated on each push to main)*" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📎 [Download test screenshots](${{ steps.screenshots.outputs.artifact-url }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📄 [Download HTML report](${{ steps.report.outputs.artifact-url }})" >> $GITHUB_STEP_SUMMARY

  deploy-report:
    name: Deploy Report to Pages
    if: ${{ !cancelled() && github.event_name == 'push' }}
    needs: e2e
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: true
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
